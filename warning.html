<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cảnh báo</title>
    <!-- Google Sans Flex & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root {
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-error: #B3261E;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Google Sans Flex', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }

        .warning-icon {
            font-size: 64px;
            color: var(--md-sys-color-error);
            margin-bottom: 24px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .content {
            font-size: 18px;
            max-width: 600px;
            line-height: 1.6;
        }

        .contact-info {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            text-decoration: none;
            border-radius: 100px; /* MD3 Full Round */
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .footer {
            margin-top: 40px;
            opacity: 0.6;
            font-style: italic;
        }
    </style>
</head>
<body>

    <span class="material-symbols-outlined warning-icon">warning</span>
    
    <h1>Đây là nội dung do AI tạo ra</h1>
    
    <div class="content">
        Tất cả những nội dung này là do AI tạo ra, nếu có vấn đề gì hãy liên hệ qua SMS/Zalo 0971834211, Facebook "Dương Tuấn Phong" hoặc phongvn406@gmail.com
    </div>

    <div class="contact-info">
        <a href="tel:0971834211" class="btn" onclick="createRipple(event)">
            <span class="material-symbols-outlined">chat</span>
            SMS / Zalo: 0971834211
        </a>
        <a href="https://www.facebook.com/search/top?q=Dương%20Tuấn%20Phong" target="_blank" class="btn" onclick="createRipple(event)">
            <span class="material-symbols-outlined">person</span>
            Facebook: Dương Tuấn Phong
        </a>
    </div>

    <div class="footer">
        (email thì hên xui 🗿)
    </div>

    <script>
        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            const rect = button.getBoundingClientRect();

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - rect.left - radius}px`;
            circle.style.top = `${event.clientY - rect.top - radius}px`;
            circle.classList.add("ripple");

            const ripple = button.getElementsByClassName("ripple")[0];
            if (ripple) ripple.remove();

            button.appendChild(circle);
        }
    </script>
</body>
</html>
