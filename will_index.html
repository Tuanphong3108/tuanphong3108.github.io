<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phong | A Random Guy</title>
    <!-- Google Sans Flex & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root {
            /* Material 3 Color Palette - Deep Dark Tech */
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-surface: #141218;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-container: #1D1B20;
            --md-sys-color-outline: #938F99;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
        }

        html, body {
            height: 100%;
            margin: 0;
            background-color: var(--md-sys-color-surface);
            scrollbar-width: thin;
            scrollbar-color: var(--md-sys-color-primary-container) transparent;
        }

        body {
            font-family: 'Google Sans Flex', sans-serif;
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            overflow-x: hidden;
            overflow-y: auto; 
        }

        /* Bento Grid Layout */
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(120px, auto);
            gap: 16px;
            max-width: 900px;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0, 1), filter 0.8s ease, opacity 0.8s ease;
        }

        .bento-item {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 28px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: box-shadow 0.4s ease, border-color 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        /* Hiệu ứng khi ẩn card đang được chọn */
        .bento-item.is-active-hidden {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .bento-item:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            border-color: var(--md-sys-color-primary);
            transform: translateY(-4px) scale(1.02);
            z-index: 2;
        }

        .bento-item:active { transform: scale(0.96); }

        /* Avatar Section */
        .avatar-block {
            grid-column: span 1; grid-row: span 1;
            padding: 0; display: flex; align-items: center; justify-content: center;
            background: none; border: none;
        }

        .avatar-img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 28px;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .avatar-block:hover .avatar-img { transform: scale(1.1) rotate(2deg); }

        /* Hero Header */
        .hero { grid-column: span 3; grid-row: span 1; justify-content: center; }
        .hero h1 {
            font-size: 48px; font-weight: 900; margin: 0; letter-spacing: -2px;
            background: linear-gradient(90deg, #FFFFFF, var(--md-sys-color-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero .subtitle { font-size: 16px; font-weight: 500; color: var(--md-sys-color-primary); margin-top: 4px; letter-spacing: 2px; }

        /* Bio */
        .bio { grid-column: span 2; grid-row: span 2; }
        .bio h2 { font-size: 22px; margin: 0 0 12px 0; color: var(--md-sys-color-primary); }
        .bio p { margin: 0; font-size: 15px; line-height: 1.7; color: var(--md-sys-color-outline); }

        /* App Launcher */
        .app-launcher {
            grid-column: span 2; grid-row: span 2;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            justify-content: center; align-items: center; gap: 16px; cursor: pointer;
        }
        .app-launcher-icon { font-size: 56px; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .app-launcher:hover .app-launcher-icon { transform: scale(1.25) rotate(15deg); }

        /* Contact Items */
        .contact-item { grid-column: span 2; flex-direction: row; align-items: center; gap: 16px; cursor: pointer; }
        .contact-icon { color: var(--md-sys-color-primary); font-size: 32px; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .contact-item:hover .contact-icon { transform: scale(1.3) rotate(-15deg); }
        .contact-info { display: flex; flex-direction: column; }
        .contact-label { font-size: 11px; font-weight: 700; color: var(--md-sys-color-outline); text-transform: uppercase; letter-spacing: 1px; }
        .contact-value { font-weight: 700; font-size: 16px; }

        /* GitHub */
        .github-block {
            grid-column: span 4; flex-direction: row; justify-content: center; align-items: center; gap: 12px;
            background: #24292e; cursor: pointer; padding: 32px;
        }
        .github-block:hover .contact-icon { transform: scale(1.2) rotate(10deg); }

        /* Transition Effects */
        .material-symbols-outlined { transition: font-variation-settings 0.3s ease; }
        .bento-item:hover .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

        #transition-overlay {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;
            display: none; transform-origin: center center; box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .loading-container {
            position: fixed; inset: 0; z-index: 10000;
            display: none; justify-content: center; align-items: center;
            background: transparent; pointer-events: none;
        }
        .loading-gif { width: 160px; filter: grayscale(1) brightness(1.8); }

        .ripple {
            position: absolute; background: rgba(255, 255, 255, 0.15);
            border-radius: 50%; transform: scale(0);
            animation: ripple-anim 0.6s ease-out; pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        @media (max-width: 650px) {
            .container { grid-template-columns: repeat(2, 1fr); }
            .hero, .bio, .app-launcher, .github-block { grid-column: span 2; }
            .avatar-block { display: none; }
        }
    </style>
</head>
<body>

    <div id="transition-overlay"></div>
    <div id="loading-container" class="loading-container">
        <img src="https://tuanphong3108.github.io/md3-loading/Loading_Indicator.gif" class="loading-gif" alt="Loading">
    </div>

    <div class="container" id="main-container">
        <div class="bento-item avatar-block">
            <img src="https://lh3.googleusercontent.com/a/ACg8ocL7DRSIvKIzipykmCoCfOn8ejcNMP2KjCjcHHasYQG8xacESbHh=s360-c-no" class="avatar-img" alt="Avatar">
        </div>

        <div class="bento-item hero">
            <h1>Phong.</h1>
            <div class="subtitle">A RANDOM GUY</div>
        </div>

        <div class="bento-item bio">
            <h2>Về tôi</h2>
            <p>
                Tôi là một người đam mê công nghệ với tư duy tối ưu hóa mọi trải nghiệm kỹ thuật số. Thích tinh chỉnh và bẻ cong các giới hạn để thiết bị chạy mượt mà nhất.
            </p>
        </div>

        <div class="bento-item app-launcher" onclick="startTransition(this, event, 'https://tuanphong3108.github.io/apps.html')">
            <span class="material-symbols-outlined app-launcher-icon">grid_view</span>
            <span style="font-weight: 900;">Mở ứng dụng của tôi</span>
        </div>

        <div class="bento-item contact-item" onclick="startTransition(this, event, 'https://zalo.me/0971834211')">
            <span class="material-symbols-outlined contact-icon">chat</span>
            <div class="contact-info">
                <span class="contact-label">Zalo</span>
                <span class="contact-value">0971834211</span>
            </div>
        </div>

        <div class="bento-item contact-item" onclick="startTransition(this, event, 'https://facebook.com/tuanphong3108')">
            <span class="material-symbols-outlined contact-icon">public</span>
            <div class="contact-info">
                <span class="contact-label">Facebook</span>
                <span class="contact-value">Dương Tuấn Phong</span>
            </div>
        </div>

        <div class="bento-item github-block" onclick="startTransition(this, event, 'https://github.com/Tuanphong3108')">
            <span class="material-symbols-outlined contact-icon">code</span>
            <div class="contact-info">
                <span class="contact-label">GitHub</span>
                <span class="contact-value">Tuanphong3108</span>
            </div>
        </div>
    </div>

    <script>
        function createRipple(element, e) {
            const rect = element.getBoundingClientRect();
            const circle = document.createElement("span");
            const d = Math.max(element.clientWidth, element.clientHeight);
            circle.style.width = circle.style.height = d + 'px';
            circle.style.left = e.clientX - rect.left - d/2 + 'px';
            circle.style.top = e.clientY - rect.top - d/2 + 'px';
            circle.classList.add("ripple");
            element.appendChild(circle);
            setTimeout(() => circle.remove(), 600);
        }

        async function startTransition(element, e, url) {
            createRipple(element, e);
            if (window.isTransitioning) return;
            window.isTransitioning = true;

            const rect = element.getBoundingClientRect();
            const overlay = document.getElementById('transition-overlay');
            const container = document.getElementById('main-container');
            const loader = document.getElementById('loading-container');
            const bgColor = window.getComputedStyle(element).backgroundColor;

            // 1. Ẩn nút hiện tại ở nền nhưng giữ chỗ (visibility: hidden)
            element.classList.add('is-active-hidden');

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // 2. Setup overlay tại đúng vị trí của nút vừa bấm
            overlay.style.display = 'block';
            overlay.style.backgroundColor = bgColor;
            overlay.style.width = rect.width + 'px';
            overlay.style.height = rect.height + 'px';
            overlay.style.left = rect.left + 'px';
            overlay.style.top = rect.top + 'px';
            overlay.style.borderRadius = '28px';
            overlay.style.transition = 'none';
            overlay.style.transform = 'scale(1)';
            overlay.style.opacity = '1';

            requestAnimationFrame(() => {
                // Phase 1: Morph thành hình tròn và bay vào trung tâm
                overlay.style.transition = 'all 0.6s cubic-bezier(0.7, 0, 0.2, 1)';
                overlay.style.width = '70px';
                overlay.style.height = '70px';
                overlay.style.borderRadius = '50%';
                overlay.style.left = (centerX - 35) + 'px';
                overlay.style.top = (centerY - 35) + 'px';
                
                // Mờ nhẹ phần còn lại của container
                container.style.filter = 'blur(4px)';
                container.style.opacity = '0.7';
                container.style.transform = 'scale(0.98)';
            });

            // Phase 2: Bùng nổ che phủ toàn bộ
            setTimeout(() => {
                overlay.style.transition = 'transform 0.8s cubic-bezier(0.7, 0, 0.2, 1)';
                const scale = (Math.max(window.innerWidth, window.innerHeight) / 30);
                overlay.style.transform = `scale(${scale})`;
                
                setTimeout(() => {
                    if (url !== '#') loader.style.display = 'flex';
                }, 300);
            }, 600);

            // Phase 3: Điều hướng
            setTimeout(() => {
                if (url !== '#') {
                    window.location.href = url;
                } else {
                    // Reset (chỉ dùng cho test/placeholder)
                    window.isTransitioning = false;
                    element.classList.remove('is-active-hidden');
                    overlay.style.transition = 'opacity 0.4s ease';
                    overlay.style.opacity = '0';
                    container.style.filter = 'none';
                    container.style.opacity = '1';
                    container.style.transform = 'scale(1)';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        loader.style.display = 'none';
                    }, 400);
                }
            }, 1800);
        }

        document.querySelectorAll('.bento-item').forEach(item => {
            if(!item.getAttribute('onclick')) {
                item.addEventListener('mousedown', (e) => createRipple(item, e));
            }
        });
    </script>
</body>
</html>
