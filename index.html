<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="LzIgM8X3HAG77g69CfiYn2rT8WCKB8CYcSDijgAWc6I" />
    <title>Phong | A Random Guy</title>
    <!-- Google Sans Flex & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        :root {
            /* Material 3 Color Palette */
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-surface: #141218;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-container: rgba(29, 27, 32, 0.7);
            --md-sys-color-outline: #938F99;
            --transition-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-smooth: cubic-bezier(0.3, 0, 0, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
        }

        html, body {
            min-height: 100%;
            margin: 0;
            background-color: var(--md-sys-color-surface);
            scrollbar-width: thin;
            scrollbar-color: var(--md-sys-color-primary-container) transparent;
        }

        body {
            font-family: 'Google Sans Flex', sans-serif;
            color: var(--md-sys-color-on-surface);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            overflow-x: hidden;
            overflow-y: auto; 
            background-image: linear-gradient(rgba(20, 18, 24, 0.75), rgba(20, 18, 24, 0.75)), 
                              url('https://scontent.fhan4-5.fna.fbcdn.net/v/t39.30808-6/653702695_915733121452565_7132930861781210816_n.jpg?_nc_cat=103&ccb=1-7&_nc_sid=2a1932&_nc_eui2=AeG_EFk9QMvW90O2H6JtkxfICUa2mOCypW0JRraY4LKlbYdxVzoW7LZX0-0oIDE4CAISliFEjtiHU0krrvyJkikH&_nc_ohc=jWWUl7quoyoQ7kNvwFLxFCY&_nc_oc=AdqGpESyVkIefWavy_FhWVu2lWgfcm_6E7SzTZA51hMRfyI4NOaNxSZV7lSWphxkCig_h4RVy4CWB0M8bf2D_T4L&_nc_zt=23&_nc_ht=scontent.fhan4-5.fna&_nc_gid=EuA1tItHaSPHX90xCHujaw&_nc_ss=7a3a8&oh=00_Afzr8QMnFPQHBzdFYuD61D29mjjBMINGsQCaGfxWAZ-AXg&oe=69D000C3');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Bento Grid Layout */
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(140px, auto);
            gap: 20px;
            max-width: 1100px;
            width: 100%;
            margin: auto; 
            transition: all 0.6s var(--transition-smooth);
            will-change: filter, transform, opacity;
        }

        .bento-item {
            background-color: var(--md-sys-color-surface-container);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 
                box-shadow 0.4s ease, 
                border-color 0.4s ease, 
                transform 0.4s var(--transition-bounce), 
                background-color 0.4s ease;
            text-decoration: none;
            color: inherit;
        }

        @media (pointer: fine) {
            .bento-item:hover {
                background-color: rgba(45, 42, 50, 0.8);
                box-shadow: 0 24px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(208, 188, 255, 0.3);
                border-color: var(--md-sys-color-primary);
                transform: translateY(-6px) scale(1.02);
                z-index: 10;
            }
        }

        .bento-item.is-active-hidden {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .bento-item:active { transform: scale(0.96); }

        /* Avatar */
        .avatar-block {
            grid-column: span 1; grid-row: span 1;
            padding: 0; display: flex; align-items: center; justify-content: center;
            background: none; border: none; backdrop-filter: none;
        }
        .avatar-img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 32px;
            transition: transform 0.8s var(--transition-smooth);
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
        }
        .avatar-block:hover .avatar-img { transform: scale(1.1) rotate(2deg); }

        /* Hero */
        .hero { grid-column: span 3; grid-row: span 1; justify-content: center; }
        .hero h1 {
            font-size: 56px; font-weight: 900; margin: 0; letter-spacing: -3px;
            background: linear-gradient(135deg, #FFFFFF 30%, var(--md-sys-color-primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero .subtitle { 
            font-size: 16px; font-weight: 700; color: var(--md-sys-color-primary); 
            margin-top: 4px; letter-spacing: 5px; opacity: 0.8;
        }

        /* Scratch Block - New */
        .scratch-block {
            grid-column: span 2; grid-row: span 3; /* Tăng độ cao cho Scratch */
            padding: 0;
            background: #000;
        }
        .scratch-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .scratch-overlay {
            position: absolute;
            inset: 0;
            background: var(--md-sys-color-surface-container);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            text-align: center;
            padding: 20px;
        }
        .scratch-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .scratch-loading-gif {
            width: 120px;
            filter: grayscale(1) brightness(1.5);
            margin-bottom: 16px;
        }
        .scratch-status {
            font-size: 14px;
            font-weight: 700;
            color: var(--md-sys-color-primary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* App Launcher */
        .app-launcher {
            grid-column: span 2; grid-row: span 1;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            justify-content: center; align-items: center; gap: 16px; cursor: pointer;
            border: none;
        }
        .app-launcher-icon { font-size: 40px; transition: transform 0.6s var(--transition-bounce); }
        .app-launcher:hover .app-launcher-icon { transform: scale(1.2) rotate(12deg); }

        /* Contacts */
        .contact-item { grid-column: span 2; flex-direction: row; align-items: center; gap: 20px; cursor: pointer; }
        .contact-icon { color: var(--md-sys-color-primary); font-size: 32px; transition: transform 0.5s var(--transition-bounce); }
        .contact-item:hover .contact-icon { transform: scale(1.3) rotate(-10deg); }
        .contact-info { display: flex; flex-direction: column; }
        .contact-label { font-size: 11px; font-weight: 800; color: var(--md-sys-color-outline); text-transform: uppercase; letter-spacing: 1.2px; }
        .contact-value { font-weight: 700; font-size: 17px; }

        /* GitHub */
        .github-block {
            grid-column: span 4; flex-direction: row; justify-content: center; align-items: center; gap: 16px;
            background: rgba(1, 4, 9, 0.85); cursor: pointer; padding: 32px;
        }

        /* Transition Overlay */
        #transition-overlay {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;
            display: none; transform-origin: center center;
            top: 0; left: 0;
            opacity: 1 !important;
        }

        .loading-container {
            position: fixed; inset: 0; z-index: 10000;
            display: none; justify-content: center; align-items: center;
            background: transparent; pointer-events: none;
        }
        .loading-gif { width: 140px; filter: grayscale(1) brightness(1.5); }

        .ripple {
            position: absolute; background: rgba(255, 255, 255, 0.15);
            border-radius: 50%; transform: scale(0);
            animation: ripple-anim 0.6s var(--transition-smooth); pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* Responsive */
        @media (max-width: 900px) {
            .container { grid-template-columns: repeat(2, 1fr); }
            .github-block, .hero, .scratch-block { grid-column: span 2; }
            .avatar-block { display: none; }
        }
        @media (max-width: 500px) {
            body { padding: 16px; }
            .hero h1 { font-size: 42px; }
            .bento-item { padding: 24px; border-radius: 28px; }
            .scratch-block { height: 300px; }
        }
    </style>
</head>
<body>

    <div id="transition-overlay"></div>
    <div id="loading-container" class="loading-container">
        <img src="https://tuanphong3108.github.io/md3-loading/Loading_Indicator.gif" class="loading-gif" alt="Loading">
    </div>

    <div class="container" id="main-container">
        <!-- Avatar -->
        <div class="bento-item avatar-block">
            <img src="https://lh3.googleusercontent.com/a/ACg8ocL7DRSIvKIzipykmCoCfOn8ejcNMP2KjCjcHHasYQG8xacESbHh=s360-c-no" class="avatar-img" alt="Avatar">
        </div>

        <!-- Hero -->
        <div class="bento-item hero">
            <h1>Phong.</h1>
            <div class="subtitle">NEW DEVELOPER WITH GOOGLE GEMINI</div>
        </div>

        <!-- Scratch Iframe Replace Bio -->
        <div class="bento-item scratch-block">
            <div id="scratch-overlay" class="scratch-overlay">
                <img src="https://tuanphong3108.github.io/md3-loading/Loading_Indicator.gif" class="scratch-loading-gif" alt="Loading">
                <div class="scratch-status">Connecting to Scratch, please wait a moment...</div>
            </div>
            <iframe id="scratch-frame" src="https://scratch.mit.edu/projects/727802570/embed" allowtransparency="true" frameborder="0" scrolling="no" allowfullscreen class="scratch-iframe"></iframe>
        </div>
        
        <!-- App Launcher -->
        <div class="bento-item app-launcher" onclick="startTransition(this, event, 'https://tuanphong3108.github.io/apps.html')">
            <span class="material-symbols-outlined app-launcher-icon">grid_view</span>
            <span style="font-weight: 900; font-size: 16px;">MỞ ỨNG DỤNG</span>
        </div>

        <!-- Zalo -->
        <div class="bento-item contact-item" onclick="startTransition(this, event, 'https://zalo.me/0971834211')">
            <span class="material-symbols-outlined contact-icon">chat</span>
            <div class="contact-info">
                <span class="contact-label">Zalo</span>
                <span class="contact-value">0971834211</span>
            </div>
        </div>

        <!-- Facebook -->
        <div class="bento-item contact-item" onclick="startTransition(this, event, 'https://facebook.com/tuanphong3108')">
            <span class="material-symbols-outlined contact-icon">public</span>
            <div class="contact-info">
                <span class="contact-label">Facebook</span>
                <span class="contact-value">Dương Tuấn Phong</span>
            </div>
        </div>

        <!-- GitHub -->
        <div class="bento-item github-block" onclick="startTransition(this, event, 'https://github.com/Tuanphong3108')">
            <span class="material-symbols-outlined contact-icon">code</span>
            <div class="contact-info">
                <span class="contact-label">GitHub Source</span>
                <span class="contact-value">Tuanphong3108</span>
            </div>
        </div>
    </div>

    <script>
        // Scratch Loader Logic
        const scratchFrame = document.getElementById('scratch-frame');
        const scratchOverlay = document.getElementById('scratch-overlay');

        scratchFrame.onload = function() {
            // Đợi thêm một chút để Iframe render ổn định
            setTimeout(() => {
                scratchOverlay.classList.add('fade-out');
            }, 1000);
        };

        function createRipple(element, e) {
            const rect = element.getBoundingClientRect();
            const circle = document.createElement("span");
            const d = Math.max(element.clientWidth, element.clientHeight);
            circle.style.width = circle.style.height = d + 'px';
            circle.style.left = e.clientX - rect.left - d/2 + 'px';
            circle.style.top = e.clientY - rect.top - d/2 + 'px';
            circle.classList.add("ripple");
            element.appendChild(circle);
            setTimeout(() => circle.remove(), 600);
        }

        async function startTransition(element, e, url) {
            createRipple(element, e);
            if (window.isTransitioning) return;
            window.isTransitioning = true;

            const rect = element.getBoundingClientRect();
            const overlay = document.getElementById('transition-overlay');
            const container = document.getElementById('main-container');
            const loader = document.getElementById('loading-container');
            
            let bgColor = window.getComputedStyle(element).backgroundColor;
            if (bgColor.startsWith('rgba')) {
                bgColor = bgColor.replace(/[^,]+(?=\))/, ' 1');
            }

            container.style.filter = 'blur(20px) brightness(0.2)';
            container.style.transform = 'scale(0.9)';
            container.style.opacity = '0';
            
            element.classList.add('is-active-hidden');

            const viewportCenterX = window.innerWidth / 2;
            const viewportCenterY = window.innerHeight / 2;

            overlay.style.display = 'block';
            overlay.style.backgroundColor = bgColor;
            overlay.style.width = rect.width + 'px';
            overlay.style.height = rect.height + 'px';
            overlay.style.left = rect.left + 'px';
            overlay.style.top = rect.top + 'px'; 
            overlay.style.position = 'fixed'; 
            overlay.style.borderRadius = window.getComputedStyle(element).borderRadius;
            overlay.style.transition = 'none';
            overlay.style.transform = 'scale(1)';
            overlay.style.opacity = '1';

            requestAnimationFrame(() => {
                overlay.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                overlay.style.width = '120px';
                overlay.style.height = '120px';
                overlay.style.borderRadius = '50%';
                overlay.style.left = (viewportCenterX - 60) + 'px';
                overlay.style.top = (viewportCenterY - 60) + 'px';
            });

            setTimeout(() => {
                overlay.style.transition = 'transform 0.7s cubic-bezier(0.3, 0, 0, 1)';
                const scale = (Math.max(window.innerWidth, window.innerHeight) / 25);
                overlay.style.transform = `scale(${scale})`;
                
                setTimeout(() => {
                    if (url !== '#') loader.style.display = 'flex';
                }, 400);
            }, 550);

            setTimeout(() => {
                if (url !== '#') {
                    window.location.href = url;
                } else {
                    window.isTransitioning = false;
                    element.classList.remove('is-active-hidden');
                    overlay.style.transition = 'opacity 0.5s ease';
                    overlay.style.opacity = '0';
                    container.style.filter = 'none';
                    container.style.opacity = '1';
                    container.style.transform = 'scale(1)';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        loader.style.display = 'none';
                    }, 500);
                }
            }, 1800);
        }

        document.querySelectorAll('.bento-item').forEach(item => {
            if(!item.getAttribute('onclick')) {
                item.addEventListener('mousedown', (e) => createRipple(item, e));
            }
        });
    </script>
</body>
</html>
